name: Validate site build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate source
        id: source_check
        shell: bash
        run: |
          set +e
          npm run check > check.log 2>&1
          status=$?
          cat check.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-log
          path: check.log
          if-no-files-found: error
          retention-days: 1
      - name: Fail when source validation failed
        if: steps.source_check.outputs.status != '0'
        run: exit 1
      - name: Build and validate output
        run: npm run build
