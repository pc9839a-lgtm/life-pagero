name: Validate site build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate source
        run: npm run check
      - name: Build and validate output
        id: site_build
        shell: bash
        run: |
          set +e
          npm run build > build.log 2>&1
          status=$?
          cat build.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: error
          retention-days: 1
      - name: Fail when build validation failed
        if: steps.site_build.outputs.status != '0'
        run: exit 1
